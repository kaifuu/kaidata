# 大数据平台 - 大数据组件编排
# 现代湖仓栈：MinIO(湖) + Kafka(总线) + Flink(流) + StarRocks(数仓, Doris 同源)
# Spark 按需 spark-submit 提交，不常驻（省内存）。
# 启动：docker compose up -d
#
# 说明：仓库用 StarRocks 替代 Doris（两者同源、同 MySQL 协议 9030、同 SQL 方言），
#       因 apache/doris 镜像在镜像源不可用且 BE 需调 max_map_count，StarRocks allin1 更稳。
#
# 网络：容器间用服务名（kafka:9092 / starrocks:9030 / minio:9000）；
#       宿主机用 localhost + 映射端口（Kafka 9094 / StarRocks 9030 / MinIO 9000）。
#
# 固定工程名 → 网络名恒为 pharma-bigdata_default（与 init 脚本、README、
# spark-submit 的 --network=pharma-bigdata_default 一致）。
# 不设 name 时，网络名随调用目录漂移（曾实测为 docker_default），导致命令失配。
name: pharma-bigdata
services:
  # ---------- 湖存储 ----------
  minio:
    image: minio/minio:latest
    container_name: pharma-minio
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes: [minio-data:/data]
    mem_limit: 512m

  # ---------- 数据总线（Apache 官方 Kafka，KRaft 无 Zk）----------
  kafka:
    image: apache/kafka:3.7.0
    container_name: pharma-kafka
    ports: ["9094:9094"]   # 宿主机经 EXTERNAL listener 访问
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"   # KRaft 必须，base64 任意
    mem_limit: 1g

  # ---------- 流计算 Flink ----------
  flink-jm:
    image: flink:1.18-java17
    container_name: pharma-flink-jm
    ports: ["8081:8081"]
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jm
        taskmanager.numberOfTaskSlots: 4
        rest.port: 8081
    volumes: [flink-jobs:/opt/flink/usrlib]
    mem_limit: 512m

  flink-tm:
    image: flink:1.18-java17
    container_name: pharma-flink-tm
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jm
        taskmanager.numberOfTaskSlots: 4
    depends_on: [flink-jm]
    volumes: [flink-jobs:/opt/flink/usrlib]
    mem_limit: 768m

  # ---------- 实时数仓 StarRocks（FE+BE allin1，MySQL 协议 9030）----------
  starrocks:
    image: starrocks/allin1-ubuntu:3.3.10
    container_name: pharma-starrocks
    ports:
      - "8030:8030"   # FE Web
      - "9030:9030"   # MySQL 协议（服务层/Flink/Spark 查询入口）
    mem_limit: 3g
    volumes: [sr-data:/opt/starrocks]

volumes:
  minio-data:
  flink-jobs:
  sr-data:
