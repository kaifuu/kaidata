<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="128" height="128">
  <defs>
    <linearGradient id="kg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00e0ff"/><stop offset="1" stop-color="#7c5cff"/>
    </linearGradient>
    <linearGradient id="kg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f6bff"/><stop offset="1" stop-color="#00e0ff"/>
    </linearGradient>
    <filter id="kgw" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2.4"/></filter>
  </defs>
  <rect width="120" height="120" rx="24" fill="#060c1c"/>
  <!-- DATA 网格：数据点 + 连接线 -->
  <g stroke="url(#kg)" stroke-width="1" opacity="0.4" fill="none">
    <path d="M16 16 L40 26 M104 16 L82 26 M16 104 L40 94 M104 104 L82 94 M16 60 L40 60 M104 60 L82 60 M60 12 L60 36"/>
  </g>
  <g fill="#00e0ff" opacity="0.8">
    <circle cx="16" cy="16" r="2.6"/><circle cx="104" cy="16" r="2.6"/>
    <circle cx="16" cy="104" r="2.6"/><circle cx="104" cy="104" r="2.6"/>
    <circle cx="16" cy="60" r="2.6"/><circle cx="104" cy="60" r="2.6"/>
    <circle cx="60" cy="12" r="2.2"/><circle cx="60" cy="36" r="2.2"/>
  </g>
  <!-- K 主体：霓虹双层（模糊发光底层 + 清晰顶层）-->
  <g fill="none" stroke="url(#kg)" stroke-width="9.5" stroke-linecap="round" opacity="0.55" filter="url(#kgw)">
    <path d="M40 26 L40 94 M40 60 L82 26 M40 60 L82 94"/>
  </g>
  <g fill="none" stroke="url(#kg2)" stroke-width="6.5" stroke-linecap="round">
    <path d="M40 26 L40 94 M40 60 L82 26 M40 60 L82 94"/>
  </g>
  <!-- AI 神经元节点：K 四端点 + 中心交叉点 -->
  <circle cx="40" cy="26" r="6" fill="#00e0ff"/>
  <circle cx="40" cy="94" r="6" fill="#00e0ff"/>
  <circle cx="82" cy="26" r="6" fill="#7c5cff"/>
  <circle cx="82" cy="94" r="6" fill="#7c5cff"/>
  <circle cx="40" cy="60" r="8" fill="#ffffff"/>
  <circle cx="40" cy="60" r="3.5" fill="#00e0ff"/>
</svg>
